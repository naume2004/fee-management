<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login - FeeFlow</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../firebase-config.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">FeeFlow</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </nav>
    <main class="container main-content">

<div class="form-container" style="max-width: 500px; margin: 5rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Student Portal Login</h2>
    <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Login using your <strong>Full Name</strong> and <strong>Student ID</strong> as your password.</p>
    
    <div id="login-error" class="error-banner" style="display: none; background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border-left: 4px solid #ef4444;"></div>

    <div class="form-card" style="padding: 2.5rem; width: 100%; background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <form id="login-form">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name</label>
                <input type="text" id="username" placeholder="e.g. John Doe" style="width: 100%; padding: 0.85rem; border-radius: 0.5rem; border: 1px solid #ddd;" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Student ID (Password)</label>
                <input type="password" id="password" placeholder="e.g. S101" style="width: 100%; padding: 0.85rem; border-radius: 0.5rem; border: 1px solid #ddd;" required>
            </div>
            
            <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 1rem; background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700;">Login to Dashboard</button>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #eee; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Don't have your credentials? Please contact the school registrar.</p>
        </div>
    </div>
    
    <div style="margin-top: 2rem; text-align: center;">
        <p style="font-size: 0.85rem; color: var(--text-muted);">Secure Portal &bull; © 2026 FeeFlow</p>
    </div>
</div>

    </main>
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-info">
                <h3>FeeFlow Student</h3>
                <p>Digital payment and queue management portal.</p>
            </div>
            <div class="footer-links">
                <p>&copy; 2026 FeeFlow. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            const studentId = document.getElementById('password').value.trim();
            
            loginError.style.display = 'none';
            const btn = loginForm.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                // Query Firestore for student with matching name and student_id
                const snapshot = await db.collection('students')
                    .where('name', '==', name)
                    .where('student_id', '==', studentId)
                    .get();

                if (!snapshot.empty) {
                    // Login successful
                    localStorage.setItem('currentStudentId', studentId);
                    window.location.href = 'dashboard.html';
                } else {
                    // Try case-insensitive search if direct match fails (optional but helpful)
                    // Firestore doesn't support case-insensitive natively easily, so we'll just stick to exact for now
                    // as it's more secure for a "password" field.
                    loginError.textContent = 'Invalid Full Name or Student ID. Please try again.';
                    loginError.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch (error) {
                console.error("Login error:", error);
                loginError.textContent = 'An error occurred during login. Please try again later.';
                loginError.style.display = 'block';
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
