            { student_id: 'S101', amount: 150.00, fee_type: 'Library Fee', status: 'Paid', payment_method: 'Card', payment_date: new Date(Date.now() - 20 * 24 * 60 * 60 * 1000), created_at: new Date(Date.now() - 25 * 24 * 60 * 60 * 1000) },

        const appointments = [
            { student_id: 'S101', appointment_date: '2026-03-01', appointment_time: '10:00:00', purpose: 'Payment arrangement', status: 'Scheduled', created_at: new Date() },
            { student_id: 'S102', appointment_date: '2026-03-04', appointment_time: '14:30:00', purpose: 'Fee inquiry', status: 'Scheduled', created_at: new Date() },
            { student_id: 'S103', appointment_date: '2026-02-28', appointment_time: '09:00:00', purpose: 'Payment plan discussion', status: 'Scheduled', created_at: new Date() }
        ];

        const queue = [
            { token_number: 201, student_id: 'S103', status: 'Serving', counter_number: 1, created_at: new Date() },
            { token_number: 202, student_id: 'S105', status: 'Waiting', counter_number: null, created_at: new Date(Date.now() - 5 * 60 * 1000) },
            { token_number: 203, student_id: 'S108', status: 'Waiting', counter_number: null, created_at: new Date(Date.now() - 3 * 60 * 1000) }
        ];

        migrateBtn.addEventListener('click', async () => {
            migrateBtn.disabled = true;
            statusDiv.innerHTML = 'Starting migration...';
            
            try {
                // Migrate Students
                statusDiv.innerHTML = 'Migrating students...';
                let batch = db.batch();
                students.forEach(student => {
                    const studentRef = db.collection('students').doc(student.student_id);
                    batch.set(studentRef, student);
                });
                await batch.commit();

                // Migrate Fees
                statusDiv.innerHTML = 'Migrating fees...';
                batch = db.batch();
                fees.forEach(fee => {
                    const feeRef = db.collection('fees').doc();
                    batch.set(feeRef, fee);
                });
                await batch.commit();

                // Migrate Appointments
                statusDiv.innerHTML = 'Migrating appointments...';
                batch = db.batch();
                appointments.forEach(app => {
                    const appRef = db.collection('appointments').doc();
                    batch.set(appRef, app);
                });
                await batch.commit();

                // Migrate Queue
                statusDiv.innerHTML = 'Migrating queue...';
                batch = db.batch();
                queue.forEach(q => {
                    const qRef = db.collection('queue').doc();
                    batch.set(qRef, q);
                });
                await batch.commit();

                statusDiv.innerHTML = 'Migration completed successfully!';
                console.log('Migration complete.');
            } catch (error) {
                statusDiv.innerHTML = 'Error during migration: ' + error.message;
                console.error(error);
            }
            migrateBtn.disabled = false;
        });

        clearBtn.addEventListener('click', async () => {
            if (!confirm('This will delete all data in students, fees, appointments, and queue collections. Continue?')) return;
            clearBtn.disabled = true;
            statusDiv.innerHTML = 'Clearing collections...';
            try {
                const collections = ['students', 'fees', 'appointments', 'queue'];
                for (const colName of collections) {
                    const snapshot = await db.collection(colName).get();
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    statusDiv.innerHTML += `<br>Cleared ${colName}.`;
                }
                statusDiv.innerHTML += '<br><strong>Done.</strong>';
            } catch (error) {
                statusDiv.innerHTML = 'Error clearing data: ' + error.message;
            }
            clearBtn.disabled = false;
        });

        // Auto-migrate on load if ?auto=true or if first visit
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auto') === 'true') {
                console.log('Auto-migration triggered...');
                migrateBtn.click();
            } else {
                statusDiv.innerHTML = 'Ready to migrate. <a href="?auto=true" style="color: blue;">Enable Auto-Sync</a> (Runs migration automatically on load)';
            }
        };
    </script>
</body>
</html>
