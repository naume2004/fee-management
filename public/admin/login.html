<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - FeeFlow</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../firebase-config.js"></script>
</head>
<body>
    <div class="form-container" style="max-width: 400px; margin: 8rem auto;">
        <h2 style="text-align:center; margin-bottom:2rem;">Staff Login</h2>
        <div id="error-message" style="display:none; background:#fee2e2; color:#7f1d1d; padding:1rem; border-radius:0.5rem; margin-bottom:1rem;"></div>
        <form id="login-form">
            <div class="form-group" style="margin-bottom:1rem;">
                <label for="email">Email Address</label>
                <input type="email" id="email" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:0.5rem;" required>
            </div>
            <div class="form-group" style="margin-bottom:1rem;">
                <label for="password">Password</label>
                <input type="password" id="password" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:0.5rem;" required>
            </div>
            <button type="submit" class="btn primary-btn" style="width:100%; background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer;">Login</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--text-muted);">
            Admin access requires a Firebase Auth account.
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'admin.html';
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
            }
        });

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
